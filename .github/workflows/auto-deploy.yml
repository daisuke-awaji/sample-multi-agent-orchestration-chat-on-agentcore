name: PR Auto Deploy

on:
  pull_request:
    types: [labeled, closed]

permissions:
  id-token: write
  contents: read
  pull-requests: write # For posting comments

jobs:
  deploy:
    if: github.event.label.name == 'auto-deploy' && github.event.action == 'labeled'
    # Note: Amazon Bedrock AgentCore Runtime requires ARM64 architecture.
    # We use ubuntu-latest with QEMU emulation because ARM runners (ubuntu-24.04-arm)
    # are not available for private repositories.
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up QEMU for cross-platform Docker builds (x86_64 -> ARM64)
      # Required because AgentCore Runtime only supports ARM64 architecture
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::988417841316:role/GitHubActionsRole
          aws-region: ap-northeast-1
          role-session-name: github-actions-pr-${{ github.event.pull_request.number }}

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda packages
        run: npm run build:lambda

      - name: Bootstrap CDK (if needed)
        working-directory: packages/cdk
        run: |
          echo "Checking CDK bootstrap status..."
          npx cdk bootstrap || echo "Bootstrap already completed or failed"

      - name: Deploy PR environment
        working-directory: packages/cdk
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Deploying PR environment: pr-${PR_NUMBER}"
          npx cdk deploy --require-approval never --all -c env=pr-${PR_NUMBER}

      - name: Comment PR with deployment info
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const prNumber = process.env.PR_NUMBER;

            const body = `## ✅ PR Environment Deployed

            A test environment for PR #${prNumber} has been deployed.
            It will be automatically destroyed when this PR is closed.

            To retrieve endpoint details, run:
            \`\`\`bash
            # Frontend URL
            aws cloudformation describe-stacks --stack-name MocaAgentCoreAppPr${prNumber} \\
              --query 'Stacks[0].Outputs[?OutputKey==\`FrontendUrl\`].OutputValue' --output text

            # All outputs
            aws cloudformation describe-stacks --stack-name MocaAgentCoreAppPr${prNumber} \\
              --query 'Stacks[0].Outputs' --output table
            \`\`\`
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Post deployment failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ❌ PR Environment Deployment Failed

            Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  cleanup:
    if: github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'auto-deploy')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::988417841316:role/GitHubActionsRole
          aws-region: ap-northeast-1
          role-session-name: github-actions-pr-${{ github.event.pull_request.number }}-cleanup

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda packages
        run: npm run build:lambda

      - name: Destroy PR environment
        working-directory: packages/cdk
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CORE_STACK="MocaAgentCoreAppPr${PR_NUMBER}"
          TARGETS_STACK="MocaAgentCoreAppPr${PR_NUMBER}Targets"
          echo "Checking if stacks exist: ${CORE_STACK}, ${TARGETS_STACK}"

          if aws cloudformation describe-stacks --stack-name ${CORE_STACK} --region ap-northeast-1 2>/dev/null || \
             aws cloudformation describe-stacks --stack-name ${TARGETS_STACK} --region ap-northeast-1 2>/dev/null; then
            echo "Stack(s) found. Destroying PR environment: pr-${PR_NUMBER}"
            npx cdk destroy --force --all -c env=pr-${PR_NUMBER}
            echo "Stacks destroyed successfully"
          else
            echo "No stacks found. Nothing to clean up."
          fi

      - name: Comment PR with cleanup info
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🧹 PR Environment Cleaned Up

            The temporary test environment has been deleted.
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Post cleanup failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ⚠️ PR Environment Cleanup Failed

            Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            You may need to manually clean up resources in the AWS Console.
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
