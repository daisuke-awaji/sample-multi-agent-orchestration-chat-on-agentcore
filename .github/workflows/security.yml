name: Security Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security-ash:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Install git
        run: |
          apt-get update && apt-get install -y --no-install-recommends git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Run ASH scan
        run: uvx 'git+https://github.com/awslabs/automated-security-helper.git@v3.1.5'
        continue-on-error: true

      - name: Upload ASH reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-security-reports
          path: .ash/ash_output/
          retention-days: 7

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .ash/ash_output/reports/ash.sarif
          category: ash-security-scan

  trivy-container-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t moca-backend:ci ./packages/backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: "moca-backend:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy-container-scan
